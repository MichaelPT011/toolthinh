name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r build-requirements.txt

      - name: Build Windows release
        shell: pwsh
        run: |
          python release_tools/build_windows.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/Tool-Veo3s-Thinh-win.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r build-requirements.txt

      - name: Build macOS release
        run: |
          python release_tools/build_macos.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: release/Tool-Veo3s-Thinh-mac.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute version and tag
        id: meta
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("version.json").read_text(encoding="utf-8"))
          version = str(data.get("version") or "0.0.0")
          print(f"version={version}")
          Path(".github-version.txt").write_text(version, encoding="utf-8")
          PY
          echo "version=$(cat .github-version.txt)" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(cat .github-version.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.meta.outputs.tag }}" release/Tool-Veo3s-Thinh-win.zip release/Tool-Veo3s-Thinh-mac.zip --clobber
          else
            gh release create "${{ steps.meta.outputs.tag }}" \
              release/Tool-Veo3s-Thinh-win.zip \
              release/Tool-Veo3s-Thinh-mac.zip \
              --title "Tool Veo3's Thinh ${{ steps.meta.outputs.version }}" \
              --target "${{ github.sha }}" \
              --generate-notes
          fi

      - name: Update latest.json on main
        run: |
          git fetch origin "${{ github.event.repository.default_branch }}"
          git switch "${{ github.event.repository.default_branch }}"
          git pull --ff-only origin "${{ github.event.repository.default_branch }}"
          python release_tools/write_latest_json.py \
            --version "${{ steps.meta.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --tag "${{ steps.meta.outputs.tag }}" \
            --output latest.json \
            --notes "Ban cap nhat moi cua Tool Veo3's Thinh."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          if git diff --cached --quiet; then
            echo "latest.json unchanged"
            exit 0
          fi
          git commit -m "Update latest.json for ${{ steps.meta.outputs.version }}"
          git push origin "${{ github.event.repository.default_branch }}"
